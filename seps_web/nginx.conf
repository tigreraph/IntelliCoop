# ─────────────────────────────────────────────────────────────
# Nginx — IntelliCoop
# Copiar a: /etc/nginx/sites-available/intellicoop
# Luego: ln -s /etc/nginx/sites-available/intellicoop /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name 157.230.62.218;

    # Logs
    access_log /var/log/nginx/intellicoop_access.log;
    error_log  /var/log/nginx/intellicoop_error.log;

    # Archivos estáticos
    location /static/ {
        alias /var/www/seps_web/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Todo lo demás → Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
